<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <!--section principale-->
    <section
        class=" relative h-screen flex flex-col z-10 justify-center items-center gap-5 sm:w-full md:w-full lg:w-full">
        <!--bacground dégradéé -->
        <div class="absolute inset-0 bg-[#494C4F]"></div>
        <img src="../Red/Images/__before.png" alt="motif" class="absolute inset-0 w-full h-screen object-cover opacity-30">
        <!-- bacground dégradée -->
        <!--contenu-->
        <div class="absolute z-20 flex flex-col gap-4">
            <!--en haut du formulaire-->
            <div class="flex gap-4 justify-center">
                <img src="../Red/Images/Link → SVG.png">
                <h1 class="text-3xl font-bold text-[#FFFFFF]">RED PRODUCT</h1>
            </div>
            <!--formulaire-->
            <form class="flex flex-col  w-md  bg-[#FFFFFF] gap-8 p-6 rounded-lg">
                <h1>Mot de passe oublié?</h1>
                <p>Entrez votre adresse e-mail ci-dessous et<br>nous vous envoyons des intructionsur sur la <br>
                    façon de modifier votre mot de passe.</p>
                <input type="email" placeholder="votre e-mail" class="border-b-2">
                <div class="flex justify-center">
                    <button class="bg-[#334155] text-[#f3f4f6] w-40 h-10 rounded-lg ">Envoyer</button>
                </div>
            </form>
            <!--en bas du formulaire-->
            <div>
                <p class="text-[#FFFFFF]">vous avez déja un compte? <span class="font-bold text-[#FFD964]"> <a
                            href="index.html">Se connecter</a></span></p>
            </div>
        </div>
    </section>
